<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guitar Learning Hub</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255,255,255,.92);
      --text: #0f172a;
      --muted: #64748b;
      --primary: #f59e0b;
      --primary2: #7c3aed;
      --line: rgba(148,163,184,.35);
      --shadow: 0 24px 70px rgba(15,23,42,.28);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 15% 10%, rgba(245,158,11,.35), transparent 28%),
        radial-gradient(circle at 85% 0%, rgba(124,58,237,.35), transparent 30%),
        linear-gradient(135deg, #020617 0%, #0f172a 55%, #1e293b 100%);
      min-height: 100vh;
    }
    .hero {
      padding: 34px 18px 18px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.1);
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 62px);
      line-height: 1.05;
      letter-spacing: -1.5px;
    }
    .hero p {
      max-width: 820px;
      margin: 16px auto 0;
      color: rgba(255,255,255,.82);
      font-size: 18px;
      line-height: 1.65;
    }
    .app {
      width: min(1320px, calc(100% - 28px));
      margin: 24px auto 36px;
      background: var(--card);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .tabs {
      display: flex;
      gap: 10px;
      padding: 14px;
      background: rgba(248,250,252,.86);
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .tab-btn {
      border: 1px solid #e2e8f0;
      background: white;
      color: #334155;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      transition: .18s ease;
    }
    .tab-btn:hover { transform: translateY(-1px); border-color: #f59e0b; }
    .tab-btn.active {
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: #111827;
      border-color: transparent;
      box-shadow: 0 10px 22px rgba(245,158,11,.24);
    }
    .viewer-wrap {
      background: #f8fafc;
      padding: 12px;
    }
    .viewer-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 8px 8px 14px;
      color: #334155;
      flex-wrap: wrap;
    }
    .viewer-title strong { font-size: 17px; }
    .open-link {
      color: #7c3aed;
      font-weight: 800;
      text-decoration: none;
    }
    iframe {
      width: 100%;
      height: 78vh;
      min-height: 650px;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: white;
    }
    .footer-note {
      padding: 14px 18px 20px;
      color: var(--muted);
      font-size: 14px;
      background: #fff;
      border-top: 1px solid var(--line);
    }
    @media (max-width: 640px) {
      .hero { padding-top: 26px; }
      .tab-btn { padding: 10px 13px; font-size: 14px; }
      iframe { height: 75vh; min-height: 560px; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <span class="badge">Guitar Learning Hub</span>
    <h1>Thư viện học Guitar</h1>
    <p>Chọn một tab bên dưới để mở từng bài học: thư viện hợp âm, cấu tạo hợp âm, âm giai, quãng, nhịp phách.</p>
  </header>

  <main class="app">
    <nav class="tabs" aria-label="Chọn bài học">
      <button class="tab-btn active" data-file="APP THƯ VIỆN HỢP ÂM 7.html" data-title="Thư viện hợp âm">Thư viện hợp âm</button>
      <button class="tab-btn" data-file="APP HỢP ÂM.html" data-title="Cấu tạo hợp âm">Cấu tạo hợp âm</button>
      <button class="tab-btn" data-file="APP ÂM GIAI.html" data-title="Âm giai">Âm giai</button>
      <button class="tab-btn" data-file="APP QUÃNG.html" data-title="Quãng">Quãng</button>
      <button class="tab-btn" data-file="APP NHỊP PHÁCH.html" data-title="Nhịp phách">Nhịp phách</button>
    </nav>

    <section class="viewer-wrap">
      <div class="viewer-title">
        <strong id="currentTitle">Thư viện hợp âm</strong>
        <a class="open-link" id="openLink" href="APP THƯ VIỆN HỢP ÂM 7.html" target="_blank" rel="noopener">Mở tab này ở trang riêng</a>
      </div>
      <iframe id="lessonFrame" src="APP THƯ VIỆN HỢP ÂM 7.html" title="Nội dung bài học"></iframe>
    </section>

    <div class="footer-note">
      Lưu ý: file index.html này phải nằm cùng thư mục với 5 file HTML gốc thì các tab mới mở đúng.
    </div>
  </main>

  <script>
    const buttons = document.querySelectorAll('.tab-btn');
    const frame = document.getElementById('lessonFrame');
    const title = document.getElementById('currentTitle');
    const openLink = document.getElementById('openLink');

    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        buttons.forEach((b) => b.classList.remove('active'));
        button.classList.add('active');

        const file = button.dataset.file;
        const label = button.dataset.title;

        frame.src = file;
        title.textContent = label;
        openLink.href = file;
      });
    });
  </script>
</body>
</html>
